version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    allow:
      - dependency-type: "all"
    schedule:
      interval: "monthly"
      time: "04:00" # UTC
    labels:
      - "domain: deps"
      - "no-changelog"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    groups:
      patches:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "patch"
      prost:
        patterns:
        - "prost"
        - "prost-*"
      rustcrypto-digest:
        patterns:
        - "digest"
        - "hmac"
        - "md-5"
        - "sha1"
        - "sha2"
        - "sha3"
  - package-ecosystem: "npm"
    directory: "/scripts/npm-tools"
    schedule:
      interval: "monthly"
      time: "04:00" # UTC
    labels:
      - "domain: deps"
      - "no-changelog"
    commit-message:
      prefix: "chore(deps)"
    # Disable version updates; security updates bypass this limit
    open-pull-requests-limit: 0
    groups:
      npm_and_yarn:
        patterns:
          - "*"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "domain: ci"
      - "no-changelog"
    commit-message:
      prefix: "chore(ci)"
